<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2315110e'/%3E%3Ctext x='32' y='42' font-family='Georgia' font-size='28' fill='%23e0a050' text-anchor='middle'%3EJK%3C/text%3E%3C/svg%3E">
<style>
:root{
  --wall:#15110e; --wall2:#1d1814; --panel:#221b16; --mat:#0f0c0a;
  --line:rgba(231,214,189,.14); --line2:rgba(231,214,189,.26);
  --ink:#f4ecdf; --muted:#b3a394; --faint:#8c7d70;
  --amber:#e0a050; --amber2:#eabb74;
  --frame:#2c2016;
  --serif:Georgia,"Times New Roman",serif;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--wall);color:var(--ink);font-family:var(--sans);
  font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
   radial-gradient(120% 90% at 50% -10%, rgba(224,160,80,.10), transparent 60%),
   radial-gradient(120% 120% at 100% 110%, rgba(148,164,126,.06), transparent 55%)}
.grain{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 22px}
a{color:inherit}
::selection{background:rgba(224,160,80,.32)}
img{display:block}

/* ---------- topbar ---------- */
header.bar{position:sticky;top:0;z-index:40;backdrop-filter:blur(10px);
  background:linear-gradient(to bottom, rgba(21,17,14,.94), rgba(21,17,14,.78));
  border-bottom:1px solid var(--line)}
.bar .wrap{display:flex;align-items:center;justify-content:space-between;height:58px;gap:12px}
.brand{display:flex;align-items:baseline;gap:10px;text-decoration:none;min-width:0}
.brand b{font-family:var(--serif);font-weight:500;font-size:19px;white-space:nowrap}
.brand span{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.bar nav{display:flex;gap:20px;align-items:center;font-size:13.5px;color:var(--muted)}
.bar nav a{text-decoration:none;transition:color .2s}
.bar nav a:hover{color:var(--ink)}
.btn3d{display:inline-flex;align-items:center;gap:8px;text-decoration:none;
  background:var(--amber);color:#1d1509;font-weight:600;font-size:13.5px;
  padding:8px 16px;border-radius:999px;transition:transform .15s, box-shadow .2s;white-space:nowrap}
.btn3d:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(224,160,80,.35)}
.langbtn{background:none;border:1px solid var(--line2);color:var(--muted);border-radius:999px;
  padding:6px 13px;font-size:12px;font-weight:600;letter-spacing:.08em;cursor:pointer;
  font-family:var(--sans);transition:color .2s, border-color .2s}
.langbtn:hover{color:var(--ink);border-color:var(--amber)}
@media(max-width:700px){.bar nav a.navlink{display:none}.brand span{display:none}}

/* ---------- hero ---------- */
.hero{position:relative;min-height:88svh;display:flex;align-items:center;padding:64px 0 40px}
.hero .wrap{display:grid;grid-template-columns:1.25fr .85fr;gap:56px;align-items:center;width:100%}
.kicker{font-size:11.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--amber2);margin-bottom:18px}
.hero h1{font-family:var(--serif);font-weight:500;font-size:clamp(46px,7.5vw,86px);
  line-height:1.02;margin:0 0 10px;letter-spacing:.01em}
.hero .dates{font-family:var(--serif);font-size:clamp(19px,2.4vw,25px);color:var(--muted);margin-bottom:22px}
.hero p.lead{font-size:clamp(15.5px,1.6vw,17.5px);color:var(--muted);max-width:52ch;margin:0 0 34px;line-height:1.75}
.hero p.lead b{color:var(--ink);font-weight:500}
.cta-row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.cta{display:inline-flex;align-items:center;gap:10px;text-decoration:none;border-radius:999px;
  padding:15px 30px;font-size:15.5px;font-weight:600;transition:transform .15s, box-shadow .25s, background .2s}
.cta.primary{background:linear-gradient(140deg, var(--amber2), var(--amber));color:#241a0a;
  box-shadow:0 10px 30px rgba(224,160,80,.28)}
.cta.primary:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(224,160,80,.42)}
.cta.ghost{border:1px solid var(--line2);color:var(--ink);background:rgba(34,27,22,.4)}
.cta.ghost:hover{background:rgba(34,27,22,.85)}
.hero .stats{display:flex;gap:26px;margin-top:44px;flex-wrap:wrap}
.stat b{display:block;font-family:var(--serif);font-size:26px;font-weight:500;color:var(--ink)}
.stat span{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}

/* framed portrait */
.portrait{justify-self:center;position:relative}
.p-frame{background:var(--frame);padding:14px;border-radius:2px;width:fit-content;margin-inline:auto;
  box-shadow:0 30px 70px rgba(0,0,0,.6), 0 4px 14px rgba(0,0,0,.5), inset 0 0 0 1px rgba(234,187,116,.18);
  transform:rotate(.6deg)}
.p-frame img{width:min(320px,64vw);height:auto}
.p-caption{margin-top:16px;text-align:center;font-size:12px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--faint)}
.p-caption b{color:var(--muted);font-weight:500}
.portrait::after{content:"";position:absolute;left:8%;right:8%;bottom:-34px;height:34px;
  background:radial-gradient(50% 100% at 50% 0%, rgba(0,0,0,.5), transparent 75%)}
@media(max-width:860px){
  .hero{min-height:auto;padding:30px 0 24px}
  .hero .wrap{grid-template-columns:1fr;gap:30px}
  .portrait{order:-1}
  .p-frame{padding:10px}
  .p-frame img{width:min(186px,46vw)}
  .p-caption{margin-top:11px}
  .portrait::after{bottom:-24px;height:24px}
  .hero .stats{gap:20px;margin-top:32px}
}
@media (prefers-reduced-motion: reduce){
  html{scroll-behavior:auto}
  .card,.card:hover,.btn3d,.cta{transition:none;transform:none}
}

/* ---------- sections ---------- */
section{position:relative;z-index:1}
.sec-head{display:flex;align-items:baseline;gap:16px;margin:0 0 26px}
.sec-head h2{font-family:var(--serif);font-weight:500;font-size:clamp(26px,3.4vw,36px);margin:0}
.sec-head .rule{flex:1;height:1px;background:var(--line)}
.about{padding:72px 0 30px}
.about .cols{display:grid;grid-template-columns:1fr 1fr;gap:44px}
.about p{color:var(--muted);margin:0 0 18px;line-height:1.8}
.about p:first-of-type::first-letter{font-family:var(--serif);font-size:290%;line-height:.8;
  padding-right:8px;float:left;color:var(--amber2)}
.about .quote{border-left:3px solid var(--amber);padding:6px 0 6px 20px;margin:26px 0 0;
  font-family:var(--serif);font-size:19px;line-height:1.6;color:var(--ink);font-style:italic}
.about .quote small{display:block;margin-top:8px;font-family:var(--sans);font-style:normal;
  font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
@media(max-width:860px){.about .cols{grid-template-columns:1fr;gap:6px}}

/* CTA banner */
.banner{margin:64px 0 8px;border:1px solid var(--line2);border-radius:20px;overflow:hidden;
  background:linear-gradient(150deg, #241c15, #191410 60%);position:relative}
.banner .strip{display:flex;height:7px}
.banner .strip i{flex:1}
.banner .inner{display:flex;align-items:center;justify-content:space-between;gap:26px;
  padding:34px 38px;flex-wrap:wrap}
.banner h3{font-family:var(--serif);font-weight:500;font-size:clamp(22px,3vw,30px);margin:0 0 8px}
.banner p{margin:0;color:var(--muted);font-size:14.5px;max-width:56ch}
@media(max-width:700px){.banner .inner{padding:26px 22px}}

/* ---------- collection ---------- */
.collection{padding:76px 0 40px}
.roomnav{position:sticky;top:58px;z-index:30;margin:0 -22px 34px;padding:12px 22px;
  background:linear-gradient(to bottom, rgba(21,17,14,.96), rgba(21,17,14,.88));
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
  display:flex;gap:9px;overflow-x:auto;scrollbar-width:none}
.roomnav::-webkit-scrollbar{display:none}
.chip{display:inline-flex;align-items:center;gap:8px;white-space:nowrap;text-decoration:none;
  font-size:12.5px;color:var(--muted);border:1px solid var(--line);border-radius:999px;
  min-height:40px;padding:9px 15px;transition:color .2s, border-color .2s, background .2s;background:rgba(34,27,22,.4)}
.chip:hover{color:var(--ink);border-color:var(--line2)}
.chip i{width:10px;height:10px;border-radius:3px;flex:none}
.sala{margin:0 0 66px;scroll-margin-top:130px}
.sala-head{display:flex;align-items:center;gap:16px;margin-bottom:8px;flex-wrap:wrap}
.sala-head .swatch{width:15px;height:38px;border-radius:4px;flex:none;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.09)}
.sala-head .t small{display:block;font-size:10.5px;letter-spacing:.28em;color:var(--faint);text-transform:uppercase}
.sala-head .t h3{margin:1px 0 0;font-family:var(--serif);font-weight:500;font-size:clamp(21px,2.6vw,27px)}
.sala-head .count{margin-left:auto;font-size:12.5px;color:var(--faint);white-space:nowrap}
.sala-head .go3d{font-size:12.5px;color:var(--amber2);text-decoration:none;white-space:nowrap;
  border:1px solid rgba(224,160,80,.35);border-radius:999px;padding:5px 13px;transition:background .2s}
.sala-head .go3d:hover{background:rgba(224,160,80,.14)}
.sala-bar{height:2px;border-radius:2px;margin:10px 0 24px;opacity:.75}
.grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(190px, 1fr));gap:20px}
@media(max-width:520px){.grid{grid-template-columns:repeat(2, 1fr);gap:13px}}

.card{position:relative;background:none;border:0;padding:0;margin:0;text-align:left;cursor:pointer;
  color:inherit;font:inherit;border-radius:6px;transition:transform .22s}
.card:hover{transform:translateY(-4px)}
.card:focus-visible{outline:2px solid var(--amber);outline-offset:4px}
.thumb{background:var(--frame);padding:7px;border-radius:2px;display:flex;gap:5px;
  box-shadow:0 10px 26px rgba(0,0,0,.5), 0 2px 6px rgba(0,0,0,.4), inset 0 0 0 1px rgba(234,187,116,.12);
  transition:box-shadow .25s}
.card:hover .thumb{box-shadow:0 18px 40px rgba(0,0,0,.62), 0 3px 9px rgba(0,0,0,.45), inset 0 0 0 1px rgba(234,187,116,.3)}
.thumb img{width:100%;height:auto;min-width:0;background:#3a332b}
.card .meta{padding:11px 3px 0}
.card .num{font-size:10.5px;letter-spacing:.14em;color:var(--faint)}
.card .ti{font-family:var(--serif);font-size:15.5px;line-height:1.3;margin:3px 0 3px;color:var(--ink)}
.card .dim{font-size:12px;color:var(--faint)}
.card .price{font-size:12.5px;color:var(--amber2);margin-top:4px}
.soldtag{position:absolute;top:14px;left:-7px;z-index:2;background:#a33327;color:#ffe9e2;
  font-size:10px;font-weight:700;letter-spacing:.12em;padding:4px 11px;border-radius:3px;
  box-shadow:0 3px 10px rgba(0,0,0,.45)}

/* ---------- lightbox ---------- */
#lb{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  background:rgba(12,9,6,.9);backdrop-filter:blur(14px);padding:20px}
#lb.open{display:flex}
.lb-box{display:flex;gap:34px;max-width:1160px;max-height:calc(100svh - 40px);align-items:center}
.lb-imgwrap{flex:1.4;min-width:0;display:flex;gap:8px;align-items:center;justify-content:center}
.lb-imgwrap img{max-width:100%;max-height:calc(100svh - 80px);height:auto;width:auto;
  background:var(--frame);padding:8px;border-radius:2px;box-shadow:0 30px 80px rgba(0,0,0,.7)}
.lb-imgwrap.duo img{max-width:49%}
.lb-info{flex:1;min-width:270px;max-width:390px;max-height:calc(100svh - 80px);overflow:auto}
.lb-info .num{font-size:11.5px;letter-spacing:.16em;color:var(--faint)}
.lb-info h3{font-family:var(--serif);font-weight:500;font-size:27px;line-height:1.25;margin:8px 0 10px}
.lb-info .sub{color:var(--muted);font-size:14px;margin-bottom:16px}
.lb-info .price{border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  padding:13px 0;font-size:14px;color:var(--muted)}
.lb-info .price b{color:var(--amber);font-size:17px;font-weight:600}
.lb-info .note{font-size:13px;color:var(--muted);font-style:italic;margin-top:14px;line-height:1.65}
.lb-info .soldi{display:inline-block;background:#a33327;color:#ffe9e2;font-size:11px;font-weight:700;
  letter-spacing:.12em;padding:5px 13px;border-radius:999px;margin-bottom:14px}
.lb-info .soldi[hidden]{display:none}
.lb-info .room{margin-top:18px;font-size:12px;color:var(--faint)}
.lb-info .room a{color:var(--amber2);text-decoration:none}
.lb-x{position:fixed;top:18px;right:20px;width:44px;height:44px;border-radius:50%;border:1px solid var(--line2);
  background:rgba(34,27,22,.7);color:var(--ink);font-size:20px;cursor:pointer;z-index:62}
.lb-nav{position:fixed;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;
  border:1px solid var(--line2);background:rgba(34,27,22,.7);color:var(--ink);font-size:22px;cursor:pointer;z-index:62;
  display:flex;align-items:center;justify-content:center;padding-bottom:3px}
.lb-nav:hover,.lb-x:hover{background:rgba(224,160,80,.22)}
#lb-prev{left:18px} #lb-next{right:18px}
@media(max-width:880px){
  .lb-box{flex-direction:column;gap:16px;overflow:auto;max-height:calc(100svh - 30px);align-items:stretch}
  .lb-imgwrap img{max-height:52svh}
  .lb-info{max-width:none;min-width:0;padding:0 4px 30px}
  .lb-nav{top:auto;bottom:calc(14px + env(safe-area-inset-bottom))}
  #lb{padding:14px}
}

/* ---------- footer ---------- */
footer{border-top:1px solid var(--line);margin-top:50px;padding:34px 0 calc(40px + env(safe-area-inset-bottom))}
footer .wrap{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;
  font-size:12.5px;color:var(--faint)}
footer a{color:var(--muted);text-decoration:none}
footer a:hover{color:var(--ink)}
</style>
</head>
<body>
<div class="grain"></div>

<header class="bar">
  <div class="wrap">
    <a class="brand" href="#"><b>Jan Kosno</b><span>1913–1996 · malarstwo</span></a>
    <nav>
      <a class="navlink" href="#o-malarzu" id="nav-about">O malarzu</a>
      <a class="navlink" href="#kolekcja" id="nav-coll">Kolekcja</a>
      <button class="langbtn" id="langbtn" title="Switch language">EN</button>
      <a class="btn3d" href="3d.html" id="nav-3d" data-place="topbar">Galeria 3D <span aria-hidden="true">→</span></a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="wrap">
    <div>
      <div class="kicker" id="i-kicker">Kolekcja rodzinna</div>
      <h1>Jan Kosno</h1>
      <div class="dates">1913 – 1996</div>
      <p class="lead" id="i-lead"></p>
      <div class="cta-row">
        <a class="cta primary" href="3d.html" data-place="hero"><span id="i-cta3d">Wejdź do galerii 3D</span> <span aria-hidden="true">→</span></a>
        <a class="cta ghost" href="#kolekcja" id="i-ctabrowse">Przeglądaj katalog ↓</a>
      </div>
      <div class="stats">
        <div class="stat"><b id="i-count">163</b><span id="i-works">prace</span></div>
        <div class="stat"><b>9</b><span id="i-rooms">sal tematycznych</span></div>
        <div class="stat"><b>1968–70</b><span id="i-paris">okres paryski</span></div>
      </div>
    </div>
    <div class="portrait">
      <div class="p-frame"><img src="assets/img/s/107.jpg" alt="Jan Kosno — autoportret" width="512" height="759"></div>
      <div class="p-caption" id="i-pcap"></div>
    </div>
  </div>
</section>

<section class="about" id="o-malarzu">
  <div class="wrap">
    <div class="sec-head"><h2 id="i-abouth">O malarzu</h2><div class="rule"></div></div>
    <div class="cols">
      <div>
        <p id="i-bio1"></p>
        <p id="i-bio2"></p>
      </div>
      <div>
        <p id="i-bio3"></p>
        <div class="quote"><span id="i-quote"></span>
          <small id="i-quotesub"></small>
        </div>
      </div>
    </div>

    <div class="banner">
      <div class="strip" id="strip"></div>
      <div class="inner">
        <div>
          <h3 id="i-bannerh"></h3>
          <p id="i-bannerp"></p>
        </div>
        <a class="cta primary" href="3d.html" data-place="banner"><span id="i-cta3d2"></span> <span aria-hidden="true">→</span></a>
      </div>
    </div>
  </div>
</section>

<section class="collection" id="kolekcja">
  <div class="wrap">
    <div class="sec-head"><h2 id="i-collh">Kolekcja</h2><div class="rule"></div></div>
    <nav class="roomnav" id="roomnav" aria-label="Sale"></nav>
    <div id="rooms"></div>
  </div>
</section>

<footer>
  <div class="wrap">
    <div id="i-footl">© Rodzina Jana Kosno · kolekcja prywatna</div>
    <div><a href="3d.html" id="i-foot3d">Galeria 3D</a> · <a href="#kolekcja" id="i-footcat">Katalog</a> · <a href="#" id="i-privacy"></a></div>
  </div>
</footer>

<div id="lb" role="dialog" aria-modal="true" aria-label="Podgląd obrazu">
  <button class="lb-x" id="lb-close" aria-label="Zamknij">✕</button>
  <button class="lb-nav" id="lb-prev" aria-label="Poprzedni">‹</button>
  <button class="lb-nav" id="lb-next" aria-label="Następny">›</button>
  <div class="lb-box">
    <div class="lb-imgwrap" id="lb-imgs"></div>
    <div class="lb-info">
      <div class="num" id="lb-num"></div>
      <h3 id="lb-title"></h3>
      <div class="sub" id="lb-sub"></div>
      <div class="soldi" id="lb-sold" hidden>SPRZEDANY</div>
      <div class="price" id="lb-price"></div>
      <div class="note" id="lb-note" hidden></div>
      <div class="room" id="lb-room"></div>
    </div>
  </div>
</div>

<script type="module">
import KOSNO from './assets/data.js';
import {getLang, setLang, makeT, tGroup, tCat, tSup, tTitle} from './assets/i18n.js';
import {initConsentBanner, resetConsent} from './assets/consent.js';

const lang = getLang();
const t = makeT(lang);
const PUB = KOSNO.items.filter(i => !i.secret);   // secret works stay off the public site
const N = PUB.length;

/* GA4 events (no-op when analytics is blocked) */
const track = (name, params) => { try { window.gtag?.('event', name, {transport_type:'beacon', ...params}); } catch(_){} };

/* localise all static copy */
document.documentElement.lang = lang;
document.title = t('titleMain');
const $$ = id => document.getElementById(id);
$$('nav-about').textContent = t('navAbout');
$$('nav-coll').textContent = t('navCollection');
$$('nav-3d').innerHTML = `${t('nav3d')} <span aria-hidden="true">→</span>`;
$$('langbtn').textContent = lang === 'pl' ? 'EN' : 'PL';
$$('langbtn').addEventListener('click', () => {
  track('lang_switch', {lang: lang === 'pl' ? 'en' : 'pl'});
  setLang(lang === 'pl' ? 'en' : 'pl');
});

/* which CTA leads people into the 3D gallery + room chip usage */
document.addEventListener('click', e => {
  const a3d = e.target.closest('a[href^="3d.html"]');
  if(a3d){ track('enter_3d_click', {placement: a3d.dataset.place || 'link'}); return; }
  const chip = e.target.closest('#roomnav .chip');
  if(chip) track('room_nav_click', {room: chip.textContent.trim()});
});
document.querySelector('.brand span').textContent = t('brandSub');
$$('i-kicker').textContent = t('kicker', {n: N});
$$('i-lead').innerHTML = t('heroLead');
$$('i-cta3d').textContent = t('ctaEnter');
$$('i-ctabrowse').textContent = t('ctaBrowse');
$$('i-count').textContent = N;
$$('i-works').textContent = t('statWorks');
$$('i-rooms').textContent = t('statRooms');
$$('i-paris').textContent = t('statParis');
$$('i-pcap').innerHTML = t('portraitCap');
$$('i-abouth').textContent = t('aboutH');
$$('i-bio1').textContent = t('bio1');
$$('i-bio2').textContent = t('bio2');
$$('i-bio3').textContent = t('bio3');
$$('i-quote').textContent = t('quote');
$$('i-quotesub').textContent = t('quoteSub');
$$('i-bannerh').textContent = t('bannerH');
$$('i-bannerp').textContent = t('bannerP');
$$('i-cta3d2').textContent = t('ctaEnter');
$$('i-collh').textContent = t('collectionH');
$$('i-footl').textContent = t('footerL');
$$('i-foot3d').textContent = t('nav3d');
$$('i-footcat').textContent = t('footerCat');
$$('i-privacy').textContent = t('privacy');
$$('i-privacy').addEventListener('click', e => { e.preventDefault(); resetConsent(t); });
initConsentBanner(t);

const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX'];
const ROOM_META = {
  'Paryż i Wenecja':      {wall:'#4b5d70', accent:'#c8a165'},
  'Pejzaże':              {wall:'#8f977c', accent:'#5d6647'},
  'Tatry i góry':         {wall:'#a4adb4', accent:'#4f5b66'},
  'Miasta polskie':       {wall:'#9c5b40', accent:'#d9a05b'},
  'Mariny':               {wall:'#2f4457', accent:'#7fa3b8'},
  'Impresje i abstrakcje':{wall:'#e7e0d1', accent:'#c67a4e'},
  'Sceny i symbolizm':    {wall:'#6e3439', accent:'#c98f4c'},
  'Portrety i akty':      {wall:'#41544a', accent:'#c9a25e'},
  'Rysunki i dyptyki':    {wall:'#4c4844', accent:'#a8a29a'},
};
const pad = n => String(n).padStart(3,'0');
const dimsOf = it => it.measured ? `${it.w} × ${it.h} cm` : `${t('approx')} ${Math.round(it.w)} × ${Math.round(it.h)} cm`;

/* palette strip in the banner = the 9 room wall colours (the enfilade) */
document.getElementById('strip').innerHTML =
  KOSNO.groups.map(g => `<i style="background:${ROOM_META[g].wall}" title="${tGroup(lang, g)}"></i>`).join('');

/* room nav chips */
document.getElementById('roomnav').innerHTML = KOSNO.groups.map((g,i) =>
  `<a class="chip" href="#sala-${i+1}"><i style="background:${ROOM_META[g].wall}"></i>${tGroup(lang, g)}</a>`).join('');

/* rooms + cards */
const ordered = [];   // flat list in display order, for lightbox prev/next
const roomsEl = document.getElementById('rooms');
roomsEl.innerHTML = KOSNO.groups.map((g,gi) => {
  const items = PUB.filter(i => i.group === g);
  const m = ROOM_META[g];
  const cards = items.map(it => {
    ordered.push(it);
    const ttl = tTitle(lang, it);
    const imgs = it.imgs.map(n =>
      `<img loading="lazy" src="assets/img/s/${n}.jpg" alt="${ttl}">`).join('');
    return `<button class="card" data-n="${it.n}">
      ${it.sold ? `<span class="soldtag">${t('soldBadge')}</span>` : ''}
      <span class="thumb">${imgs}</span>
      <span class="meta">
        <span class="num">№ ${pad(it.n)}${it.year ? ' · ' + it.year : ''}</span>
        <span class="ti" style="display:block">${ttl}</span>
        <span class="dim" style="display:block">${dimsOf(it)}</span>
        ${it.sold && it.soldInfo ? `<span class="price" style="display:block">${t('sold')} · ${it.soldInfo}</span>` : ''}
      </span>
    </button>`;
  }).join('');
  return `<div class="sala" id="sala-${gi+1}">
    <div class="sala-head">
      <div class="swatch" style="background:${m.wall}"></div>
      <div class="t"><small>${t('room')} ${ROMAN[gi]}</small><h3>${tGroup(lang, g)}</h3></div>
      <span class="count">${items.length} ${t('works')}</span>
      <a class="go3d" href="3d.html?sala=${gi+1}" data-place="sala">${t('see3d')}</a>
    </div>
    <div class="sala-bar" style="background:linear-gradient(90deg, ${m.accent}, transparent 70%)"></div>
    <div class="grid">${cards}</div>
  </div>`;
}).join('');

/* ---------- lightbox ---------- */
const lb = document.getElementById('lb');
const el = id => document.getElementById(id);
let cur = -1;

function openLB(idx, source = 'card'){
  cur = (idx + ordered.length) % ordered.length;
  const it = ordered[cur];
  track('painting_open', {painting_id: it.n, painting_title: it.title, room: it.group, source});
  const wrap = el('lb-imgs');
  wrap.classList.toggle('duo', it.imgs.length > 1);
  wrap.innerHTML = it.imgs.map(n => `<img src="assets/img/l/${n}.jpg" alt="${tTitle(lang, it)}">`).join('');
  el('lb-num').textContent = `№ ${pad(it.n)} · ${tCat(lang, it.cat)}`;
  el('lb-title').textContent = tTitle(lang, it);
  el('lb-sub').textContent = [it.year, dimsOf(it), tSup(lang, it.support)].filter(Boolean).join(' · ');
  el('lb-price').hidden = !it.sold;
  if(it.sold && it.soldInfo) el('lb-price').innerHTML = `${t('sold')}: <b>${it.soldInfo}</b>`;
  el('lb-sold').hidden = !it.sold;
  el('lb-sold').textContent = t('soldBadge');
  el('lb-note').hidden = true;
  const gi = KOSNO.groups.indexOf(it.group);
  el('lb-room').innerHTML = `${t('room')} ${ROMAN[gi]} — ${tGroup(lang, it.group)} · <a href="3d.html?obraz=${it.n}" data-place="lightbox">${t('seeIn3d')}</a>`;
  history.replaceState(null, '', '#obraz-' + it.n);   // shareable link to this painting
  const wasOpen = lb.classList.contains('open');
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
  if(!wasOpen){ lastFocus = document.activeElement; el('lb-close').focus(); }
}
let lastFocus = null;
function closeLB(){
  lb.classList.remove('open'); document.body.style.overflow = ''; cur = -1;
  history.replaceState(null, '', location.pathname + location.search);
  if(lastFocus){ lastFocus.focus(); lastFocus = null; }
}

roomsEl.addEventListener('click', e => {
  const c = e.target.closest('.card');
  if(!c) return;
  openLB(ordered.findIndex(i => i.n === +c.dataset.n));
});
el('lb-close').addEventListener('click', closeLB);
el('lb-prev').addEventListener('click', () => openLB(cur - 1, 'nav'));
el('lb-next').addEventListener('click', () => openLB(cur + 1, 'nav'));
lb.addEventListener('click', e => { if(e.target === lb) closeLB(); });
addEventListener('keydown', e => {
  if(!lb.classList.contains('open')) return;
  if(e.key === 'Escape') closeLB();
  if(e.key === 'ArrowLeft') openLB(cur - 1, 'nav');
  if(e.key === 'ArrowRight') openLB(cur + 1, 'nav');
});
/* swipe on mobile */
let tx = null;
lb.addEventListener('touchstart', e => tx = e.touches[0].clientX, {passive:true});
lb.addEventListener('touchend', e => {
  if(tx === null) return;
  const dx = e.changedTouches[0].clientX - tx;
  if(Math.abs(dx) > 60) openLB(cur + (dx < 0 ? 1 : -1), 'nav');
  tx = null;
}, {passive:true});

/* deep link: ?obraz=N or #obraz-N opens the lightbox on that painting */
{
  const q = new URLSearchParams(location.search);
  const hm = (location.hash.match(/^#obraz-(\d+)$/) || [])[1];
  const ob = +(q.get('obraz') || hm || 0);
  const idx = ordered.findIndex(i => i.n === ob);
  if(idx >= 0){
    document.querySelector(`.card[data-n="${ob}"]`)?.scrollIntoView({block:'center', behavior:'instant'});
    openLB(idx, 'deeplink');
  }
}
</script>
